{% extends "base.html" %}

{% block title %}
Add Student
{% endblock %}

{% block content %}

<div class="container">

    <h2>Add Student</h2>

    <form method="POST" enctype="multipart/form-data">

       <label for="name">Full Name</label>
<input type="text" id="name" name="name">

        <label for="roll_no">Roll Number</label>
        <input type="text" id="roll_no" name="roll_no" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number</label>
        <input type="text" id="phone" name="phone" required>

        <label for="course">Course</label>

        <select name="course">

            <option>BCA</option>
            <option>MCA</option>
            <option>B.Tech</option>
            <option>M.Tech</option>
            <option>BBA</option>
            <option>MBA</option>
            <option>B.Com</option>
            <option>B.A</option>

        </select>


        <label fo>Semester</label>

        <select name="semester">

            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>  

        </select>


        <label>Gender</label>
<select name="gender" id="gender">
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
</select>

        <label>Address</label>

        <textarea name="address" rows="4"></textarea>

<div class="col-md-6">

<label>Date of Birth</label>

<input
type="date"
name="dob"
class="form-control"
required>

</div>
<div class="col-md-6">

<label>Admission Date</label>

<input
type="date"
name="admission_date"
class="form-control"
required>

</div>
<div class="col-md-6">

<label class="form-label">

Student Photo

</label>

<input
type="file"
name="photo"
class="form-control"
accept="image/*">

</div>
        <button type="submit">

            Add Student

        </button>

    </form>

</div>

{% endblock %}
